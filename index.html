<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocol Simulator</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
        }

        .container {
            max-width: 520px;
            margin: 70px auto;
            background: #1e293b;
            padding: 28px;
            border-radius: 14px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.35);
        }

        h1 {
            margin-top: 0;
            margin-bottom: 22px;
            text-align: center;
            font-size: 28px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            margin-top: 14px;
            font-weight: bold;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            padding: 11px;
            border: none;
            border-radius: 8px;
            outline: none;
            font-size: 15px;
            background: #e5e7eb;
            color: #111827;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
        }

        button:hover {
            background: #1d4ed8;
        }

        pre {
            margin-top: 20px;
            background: #0b1220;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 16px;
            white-space: pre-wrap;
            word-wrap: break-word;
            min-height: 140px;
            font-size: 14px;
        }

        .hint {
            margin-top: 14px;
            font-size: 13px;
            color: #cbd5e1;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Protocol Simulator</h1>

        <label for="msg">Message</label>
        <input type="text" id="msg" placeholder="Ex: Hello">

        <label for="err">Error probability</label>
        <input type="text" id="err" placeholder="Ex: 0.3">

        <label for="retry">Max retries</label>
        <input type="text" id="retry" placeholder="Ex: 3">

        <button onclick="sendData()">Run simulation</button>

        <div class="hint">
            Exemplu: message = Hello, error probability = 0.5, max retries = 3
        </div>

        <pre id="result">Aici va aparea rezultatul...</pre>
    </div>

    <script>
        function sendData() {
            const msg = document.getElementById("msg").value;
            const err = document.getElementById("err").value;
            const retry = document.getElementById("retry").value;

            fetch(`/simulate?msg=${encodeURIComponent(msg)}&err=${encodeURIComponent(err)}&retry=${encodeURIComponent(retry)}`)
                .then(res => res.text())
                .then(data => {
                    document.getElementById("result").textContent = data;
                })
                .catch(error => {
                    document.getElementById("result").textContent = "Eroare: " + error;
                });
        }
    </script>
</body>
</html>
